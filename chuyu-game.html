<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空气捞鱼</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #3a7a9a;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        canvas { display: block; }

        .ui-overlay {
            position: absolute;
            top: 24px;
            left: 28px;
            color: #ffffff;
            pointer-events: none;
            z-index: 10;
        }
        .ui-overlay h1 {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 4px;
        }
        .ui-overlay .subtitle {
            font-size: 11px;
            color: #6a8a9a;
            letter-spacing: 3px;
        }

        .score-board {
            position: absolute;
            top: 24px;
            right: 28px;
            color: #c8f8ff;
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            text-align: right;
        }
        .score-board .score {
            font-size: 36px;
            font-weight: 200;
            color: #ffd93d;
        }
        .score-board .timer {
            font-size: 24px;
            color: #ff6b6b;
            margin-top: 8px;
        }
        .score-board .combo {
            font-size: 16px;
            color: #6bcf7f;
            margin-top: 4px;
        }

        .distance-bar {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }
        .distance-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9aaa, #6ac4d8, #a8e8f8);
            border-radius: 2px;
            transition: width 0.1s ease-out;
        }
        .distance-label {
            position: absolute;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%);
            color: #4a6a7a;
            font-size: 10px;
            letter-spacing: 4px;
            pointer-events: none;
        }

        .hint {
            position: absolute;
            bottom: 72px;
            left: 50%;
            transform: translateX(-50%);
            color: #5a8a9a;
            font-size: 11px;
            letter-spacing: 2px;
            pointer-events: none;
            animation: pulse 3s ease-in-out infinite;
            text-align: center;
            line-height: 1.6;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.7; }
        }

        .serial-status {
            position: absolute;
            top: 60px;
            right: 28px;
            color: #4a6a7a;
            font-size: 11px;
            pointer-events: auto;
            cursor: pointer;
            padding: 8px 18px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            transition: all 0.3s;
            background: rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .serial-status:hover {
            border-color: rgba(255,255,255,0.2);
            color: #a8d8e8;
        }
        .serial-status.connected {
            color: #7a9e9a;
            border-color: rgba(122,158,138,0.25);
        }

        .start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 48px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
            color: #e8f4f8;
            font-size: 18px;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.4s;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .start-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
            transform: translate(-50%, -50%) scale(1.05);
        }
        .start-btn.hidden {
            display: none;
        }

        .result-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .result-overlay.show {
            display: flex;
            opacity: 1;
        }
        .result-title {
            color: #e8f4f8;
            font-size: 28px;
            letter-spacing: 8px;
            margin-bottom: 8px;
            font-weight: 300;
        }
        .result-score {
            color: #ffd93d;
            font-size: 72px;
            font-weight: 200;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .result-label {
            color: #6a8a9a;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }
        .result-rank {
            color: #a8e8f8;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 2;
        }
        .result-btn {
            padding: 12px 36px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #e8f4f8;
            font-size: 14px;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 28px;
            transition: all 0.3s;
            margin: 0 8px;
        }
        .result-btn:hover {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
        }
        .result-btn.primary {
            border-color: rgba(255,217,61,0.4);
            background: rgba(255,217,61,0.1);
            color: #ffd93d;
        }

        .catch-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 3px solid rgba(255,217,61,0);
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.3s;
        }
        .catch-indicator.charging {
            border-color: rgba(255,217,61,0.8);
            box-shadow: 0 0 20px rgba(255,217,61,0.4);
        }
        .catch-indicator.ready {
            border-color: rgba(255,107,107,0.9);
            box-shadow: 0 0 30px rgba(255,107,107,0.6);
            animation: pulseRing 0.5s ease-in-out infinite;
        }
        @keyframes pulseRing {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .fish-info {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #6a8a9a;
            font-size: 12px;
            letter-spacing: 2px;
            pointer-events: none;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .fish-info.show {
            opacity: 1;
        }

        .combo-display {
            position: absolute;
            top: 35%;
            right: 28px;
            transform: translateX(20px) scale(0.8);
            text-align: center;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.3s ease;
        }
        .combo-display.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }
        .combo-display.pop {
            animation: comboPop 0.5s ease-out;
        }
        @keyframes comboPop {
            0% { transform: translateX(0) scale(1.3); }
            50% { transform: translateX(0) scale(0.95); }
            100% { transform: translateX(0) scale(1); }
        }
        .combo-number {
            font-size: 56px;
            font-weight: 800;
            color: #ffd93d;
            text-shadow: 0 0 20px rgba(255,217,61,0.6), 0 0 40px rgba(255,217,61,0.3);
            line-height: 1;
            letter-spacing: 2px;
        }
        .combo-text {
            font-size: 16px;
            color: #ffd93d;
            letter-spacing: 6px;
            margin-top: 2px;
            text-shadow: 0 0 10px rgba(255,217,61,0.4);
        }
        .combo-display .combo-fire {
            font-size: 36px;
            margin-bottom: -4px;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="ui-overlay">
            <h1>空气捞鱼</h1>
            <div class="subtitle">AIR FISHING</div>
        </div>

        <div class="score-board">
            <div>得分</div>
            <div class="score" id="score">0</div>
            <div class="timer" id="timer">60</div>
            <div class="combo" id="combo"></div>
        </div>

        <div class="distance-label">深度</div>
        <div class="distance-bar">
            <div class="distance-fill" id="distanceFill"></div>
        </div>

        <div class="hint" id="hint">
            手靠近超声波传感器下潜<br>
            大鱼分数高，小鱼分数低
        </div>

        <div class="serial-status" id="serialBtn" onclick="toggleSerial()">🔌 连接硬件</div>

        <div class="catch-indicator" id="catchIndicator"></div>

        <div class="fish-info" id="fishInfo">+3分 大鱼！</div>

        <div class="combo-display" id="comboDisplay">
            <div class="combo-fire">🔥</div>
            <div class="combo-number" id="comboNumber">2</div>
            <div class="combo-text">连击</div>
        </div>

        <button class="start-btn" id="startBtn" onclick="startGame()">开始游戏</button>

        <div class="result-overlay" id="resultOverlay">
            <div class="result-title">时间到！</div>
            <div class="result-score" id="resultScore">0</div>
            <div class="result-label">分</div>
            <div class="result-rank" id="resultRank"></div>
            <div>
                <button class="result-btn" onclick="saveScore()">保存成绩</button>
                <button class="result-btn primary" onclick="restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==================== 音频上下文（背景音乐） ====================
        let audioCtx = null;
        let bgmOscillators = [];
        let bgmGain = null;

        function initAudio() {
            // 背景音乐已关闭
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playCatchSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 400;
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.value = 0.3;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playBubbleSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 200 + Math.random() * 100;
            gain.gain.value = 0.1;
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // ==================== 全局状态 ====================
        const state = {
            distance: 50,
            targetDistance: 50,
            serialConnected: false,
            serialPort: null,
            serialReader: null,
            time: 0,
            handActive: false,
            handX: 0,
            handY: 0,
            handZ: 0,
            score: 0,
            gameTime: 60,
            gameActive: false,
            catchProgress: 0,
            catchingFish: null,
            combo: 0,
            lastCatchTime: 0
        };

        // ==================== Three.js 场景 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x3a7a9a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // ==================== 灯光 ====================
        const ambientLight = new THREE.AmbientLight(0x4a8aaa, 0.9);
        scene.add(ambientLight);

        const waterLight = new THREE.DirectionalLight(0x7ac4e8, 1.2);
        waterLight.position.set(0, 10, 5);
        scene.add(waterLight);

        const causticLight = new THREE.PointLight(0x8ae8f8, 0.9, 25);
        causticLight.position.set(0, 0, 0);
        scene.add(causticLight);

        const bottomLight = new THREE.PointLight(0x3a6a8a, 0.6, 20);
        bottomLight.position.set(0, -3, 0);
        scene.add(bottomLight);

        // ==================== 水面 ====================
        const waterGeo = new THREE.PlaneGeometry(24, 24, 80, 80);
        const waterMat = new THREE.MeshStandardMaterial({
            color: 0x2a6a8a,
            roughness: 0.1,
            metalness: 0.3,
            transparent: true,
            opacity: 0.65,
            side: THREE.DoubleSide
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = 0;
        scene.add(water);

        const waterOriginalPos = new Float32Array(waterGeo.attributes.position.count * 3);
        for (let i = 0; i < waterGeo.attributes.position.count * 3; i++) {
            waterOriginalPos[i] = waterGeo.attributes.position.array[i];
        }

        // ==================== 捞鱼杆 ====================
        const rodGroup = new THREE.Group();

        const rodGeo = new THREE.CylinderGeometry(0.05, 0.08, 8, 8);
        const rodMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.5 });
        const rod = new THREE.Mesh(rodGeo, rodMat);
        rod.position.y = 4;
        rodGroup.add(rod);

        const netRingGeo = new THREE.TorusGeometry(1.5, 0.1, 8, 24);
        const netRingMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
        const netRing = new THREE.Mesh(netRingGeo, netRingMat);
        netRing.position.y = -0.5;
        netRing.rotation.x = Math.PI / 2;
        rodGroup.add(netRing);

        const netBottomGeo = new THREE.CircleGeometry(1.5, 24);
        const netBottomMat = new THREE.MeshStandardMaterial({ 
            color: 0xcccccc, 
            transparent: true, 
            opacity: 0.3,
            side: THREE.DoubleSide
        });
        const netBottom = new THREE.Mesh(netBottomGeo, netBottomMat);
        netBottom.position.y = -0.8;
        netBottom.rotation.x = Math.PI / 2;
        rodGroup.add(netBottom);

        const progressGeo = new THREE.RingGeometry(1.6, 1.8, 32);
        const progressMat = new THREE.MeshBasicMaterial({
            color: 0xffd93d,
            transparent: true,
            opacity: 0,
            side: THREE.DoubleSide
        });
        const progressRing = new THREE.Mesh(progressGeo, progressMat);
        progressRing.position.y = -0.5;
        progressRing.rotation.x = Math.PI / 2;
        rodGroup.add(progressRing);

        scene.add(rodGroup);

        // ==================== 鱼（30条，不同大小不同分数） ====================
        const fishCount = 35;
        const fishes = [];
        const fishColors = [
            0xff6b6b, 0xffd93d, 0x6bcf7f, 0x4d96ff, 0xff8c42,
            0xff6b9d, 0xc44569, 0xf8b500, 0x00d2d3, 0x5f27cd,
            0x54a0ff, 0x48dbfb, 0x1dd1a1, 0xff9f43, 0xee5a24,
            0xa29bfe, 0xfd79a8, 0xfdcB6e, 0x6c5ce7, 0xe17055
        ];

        function createFish(index, x, y, z) {
            // 大小决定分数：0.5=1分，1.4=5分
            const sizeScale = 0.5 + Math.random() * 0.9;
            const points = Math.floor(sizeScale * 5) + 2;  // 3-6分
            const baseSpeed = (1.5 - sizeScale) * 0.08;

            const isCurious = Math.random() < 0.3;

            const bodyGeo = new THREE.SphereGeometry(0.25 * sizeScale, 12, 12);
            bodyGeo.scale(1.8, 0.9, 0.7);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: fishColors[index % fishColors.length],
                roughness: 0.3,
                metalness: 0.1,
                emissive: fishColors[index % fishColors.length],
                emissiveIntensity: 0.2
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);

            const tailGeo = new THREE.ConeGeometry(0.15 * sizeScale, 0.4 * sizeScale, 8);
            tailGeo.rotateZ(Math.PI / 2);
            const tailMat = new THREE.MeshStandardMaterial({
                color: fishColors[index % fishColors.length],
                roughness: 0.3
            });
            const tail = new THREE.Mesh(tailGeo, tailMat);
            tail.position.x = -0.45 * sizeScale;

            const eyeGeo = new THREE.SphereGeometry(0.04 * sizeScale, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(0.25 * sizeScale, 0.08 * sizeScale, 0.12 * sizeScale);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.25 * sizeScale, 0.08 * sizeScale, -0.12 * sizeScale);

            const fishGroup = new THREE.Group();
            fishGroup.add(body);
            fishGroup.add(tail);
            fishGroup.add(eyeL);
            fishGroup.add(eyeR);

            fishGroup.position.set(x, y, z);

            const dirAngle = Math.random() * Math.PI * 2;
            const speed = baseSpeed * (0.5 + Math.random() * 0.5);

            fishGroup.userData = {
                velocity: new THREE.Vector3(
                    Math.cos(dirAngle) * speed,
                    (Math.random() - 0.5) * speed * 0.3,
                    Math.sin(dirAngle) * speed
                ),
                baseSpeed: baseSpeed,
                tailWag: Math.random() * Math.PI * 2,
                tailWagSpeed: 0.1 + (1.5 - sizeScale) * 0.3,
                scared: 0,
                caught: false,
                respawnTime: 0,
                bodyMat: bodyMat,
                sizeScale: sizeScale,
                points: points,
                smoothVelocity: new THREE.Vector3(0, 0, 0),
                isCurious: isCurious,
                interestLevel: 0,
                hesitation: Math.random() * 3
            };

            scene.add(fishGroup);
            fishes.push(fishGroup);
            return fishGroup;
        }

        for (let i = 0; i < fishCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            // 更分散：半径范围扩大到1-14，避免中间聚集
            const radius = 1 + Math.random() * 13;
            const height = (Math.random() - 0.5) * 7;
            createFish(i, 
                Math.cos(angle) * radius,
                height,
                Math.sin(angle) * radius
            );
        }

        // ==================== 气泡和粒子 ====================
        const bubbles = [];
        const bubbleGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const bubbleMat = new THREE.MeshBasicMaterial({
            color: 0xa8e8f8,
            transparent: true,
            opacity: 0.6
        });

        function createBubble(x, y, z, count) {
            for (let i = 0; i < count; i++) {
                const bubble = new THREE.Mesh(bubbleGeo, bubbleMat);
                bubble.position.set(
                    x + (Math.random() - 0.5) * 1,
                    y + (Math.random() - 0.5) * 1,
                    z + (Math.random() - 0.5) * 1
                );
                bubble.userData = {
                    speed: 0.03 + Math.random() * 0.04,
                    wobble: Math.random() * Math.PI * 2
                };
                scene.add(bubble);
                bubbles.push(bubble);
            }
            playBubbleSound();
        }

        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.08, 6, 6);

        function createCatchParticles(x, y, z, color) {
            for (let i = 0; i < 20; i++) {
                const pMat = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.8
                });
                const p = new THREE.Mesh(particleGeo, pMat);
                p.position.set(x, y, z);
                p.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.4,
                        Math.random() * 0.4,
                        (Math.random() - 0.5) * 0.4
                    ),
                    life: 1.0
                };
                scene.add(p);
                particles.push(p);
            }
        }

        // ==================== 游戏逻辑 ====================
        let gameTimer = null;

        function startGame() {
            initAudio();  // 初始化音频
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('hint').style.opacity = '0';
            state.gameActive = true;
            state.score = 0;
            state.gameTime = 40;
            state.catchProgress = 0;
            state.catchingFish = null;
            state.combo = 0;

            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '40';
            document.getElementById('timer').style.color = '#ff6b6b';
            document.getElementById('combo').textContent = '';

            fishes.forEach((fish, i) => {
                fish.visible = true;
                fish.userData.caught = false;
                fish.userData.interestLevel = 0;
                const angle = Math.random() * Math.PI * 2;
                const radius = 3 + Math.random() * 10;
                fish.position.set(
                    Math.cos(angle) * radius,
                    (Math.random() - 0.5) * 6,
                    Math.sin(angle) * radius
                );
            });

            gameTimer = setInterval(() => {
                state.gameTime--;
                document.getElementById('timer').textContent = state.gameTime;

                if (state.gameTime <= 10) {
                    document.getElementById('timer').style.color = '#ff0000';
                }

                if (state.gameTime <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(gameTimer);
            state.gameActive = false;

            // 背景音乐已关闭

            document.getElementById('resultScore').textContent = state.score;

            const scores = JSON.parse(localStorage.getItem('fishingScores') || '[]');
            scores.push({ score: state.score, date: new Date().toLocaleDateString() });
            scores.sort((a, b) => b.score - a.score);
            const top5 = scores.slice(0, 5);

            let rankHtml = '<div style="margin-bottom:16px;">🏆 排行榜</div>';
            top5.forEach((s, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '•';
                rankHtml += `<div>${medal} ${s.score}分 ${s.date}</div>`;
            });
            document.getElementById('resultRank').innerHTML = rankHtml;

            document.getElementById('resultOverlay').classList.add('show');
        }

        function saveScore() {
            const scores = JSON.parse(localStorage.getItem('fishingScores') || '[]');
            scores.push({ score: state.score, date: new Date().toLocaleDateString() });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('fishingScores', JSON.stringify(scores.slice(0, 10)));
            alert('成绩已保存！');
        }

        function restartGame() {
            document.getElementById('resultOverlay').classList.remove('show');
            document.getElementById('timer').style.color = '#ff6b6b';
            startGame();
        }

        // ==================== 串口通信 ====================
        async function toggleSerial() {
            const btn = document.getElementById('serialBtn');
            if (state.serialConnected) {
                if (state.serialReader) { await state.serialReader.cancel(); state.serialReader = null; }
                if (state.serialPort) { await state.serialPort.close(); state.serialPort = null; }
                state.serialConnected = false;
                btn.textContent = '🔌 连接硬件';
                btn.classList.remove('connected');
                return;
            }
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                state.serialPort = port;
                state.serialConnected = true;
                btn.textContent = '✅ 硬件已连接';
                btn.classList.add('connected');
                const reader = port.readable.getReader();
                state.serialReader = reader;
                readSerial(reader);
            } catch (err) {
                btn.textContent = '❌ 连接失败';
                setTimeout(() => btn.textContent = '🔌 连接硬件', 2000);
            }
        }

        async function readSerial(reader) {
            const decoder = new TextDecoder();
            let buffer = '';
            try {
                while (state.serialConnected) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        const t = line.trim();
                        if (t.startsWith('D:')) {
                            const v = parseInt(t.substring(2));
                            if (!isNaN(v)) {
                                state.targetDistance = Math.max(2, Math.min(50, v));
                                state.handActive = state.targetDistance < 15;
                            }
                        }
                    }
                }
            } catch (e) {}
        }

        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            state.time += 0.016;

            state.distance += (state.targetDistance - state.distance) * 0.15;

            const fillPercent = Math.max(0, Math.min(100, (50 - state.distance) / 50 * 100));
            document.getElementById('distanceFill').style.width = fillPercent + '%';

            // 捞鱼杆位置：距离映射到深度，让一半距离就有明显变化
            state.handX = 0;
            state.handZ = 0;
            // 传感器范围 2-15cm，映射到深度 -4 到 0
            // 2cm(最近) = 深度-4（最深处）
            // 15cm(最远) = 深度0（水面）
            // 8.5cm(中间) = 深度-2（中间位置）
            const normalizedDist = Math.max(0, Math.min(1, (state.distance - 2) / 13));
            const targetHandY = -4 * (1 - normalizedDist);
            state.handY += (targetHandY - state.handY) * 0.1;  // 平滑过渡
            state.handY = Math.max(-4, Math.min(0, state.handY));  // 限制范围

            rodGroup.position.x = state.handX;
            rodGroup.position.z = state.handZ;
            rodGroup.position.y = state.handY + 2;

            // 水面涟漪
            const waterPos = waterGeo.attributes.position.array;
            for (let i = 0; i < waterGeo.attributes.position.count; i++) {
                const x = waterOriginalPos[i * 3];
                const z = waterOriginalPos[i * 3 + 2];
                let y = 0;

                y += Math.sin(x * 0.2 + state.time * 0.5) * 0.08;
                y += Math.cos(z * 0.15 + state.time * 0.4) * 0.08;

                if (state.handActive) {
                    const dx = x - state.handX;
                    const dz = z - state.handZ;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < 3) {
                        const strength = (15 - state.distance) / 15;
                        y -= (3 - dist) / 3 * strength * 0.8;
                    }
                }

                waterPos[i * 3 + 1] = y;
            }
            waterGeo.attributes.position.needsUpdate = true;
            waterGeo.computeVertexNormals();

            // 更新鱼
            let closestFish = null;
            let closestDist = 100;

            fishes.forEach((fish, index) => {
                const data = fish.userData;

                if (data.caught) {
                    data.respawnTime -= 0.016;
                    if (data.respawnTime <= 0) {
                        data.caught = false;
                        fish.visible = true;
                        data.interestLevel = 0;
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 5 + Math.random() * 8;
                        fish.position.set(
                            Math.cos(angle) * radius,
                            (Math.random() - 0.5) * 6,
                            Math.sin(angle) * radius
                        );
                    }
                    return;
                }

                let distToHand = 100;
                if (state.handActive && state.gameActive) {
                    const dx = fish.position.x - state.handX;
                    const dy = fish.position.y - state.handY;
                    const dz = fish.position.z - state.handZ;
                    distToHand = Math.sqrt(dx * dx + dy * dy + dz * dz);

                    if (distToHand < closestDist) {
                        closestDist = distToHand;
                        closestFish = fish;
                    }
                }

                let targetVx = data.velocity.x;
                let targetVy = data.velocity.y;
                let targetVz = data.velocity.z;

                if (state.handActive && state.gameActive && data.isCurious) {
                    const attractStrength = (50 - state.distance) / 50 * 0.015;

                    if (distToHand > 5) {
                        data.interestLevel += 0.003;
                    } else {
                        data.interestLevel -= 0.005;
                    }
                    data.interestLevel = Math.max(0, Math.min(1, data.interestLevel));

                    data.hesitation -= 0.016;
                    if (data.hesitation <= 0) {
                        data.hesitation = 2 + Math.random() * 4;
                        data.interestLevel = Math.random();
                    }

                    if (data.interestLevel > 0.3) {
                        targetVx += (state.handX - fish.position.x) * attractStrength * data.interestLevel;
                        targetVy += (state.handY - fish.position.y) * attractStrength * 0.3 * data.interestLevel;
                        targetVz += (state.handZ - fish.position.z) * attractStrength * data.interestLevel;
                    }

                    if (distToHand < 2) {
                        const pushForce = (2 - distToHand) / 2 * 0.01;
                        targetVx -= (state.handX - fish.position.x) * pushForce;
                        targetVz -= (state.handZ - fish.position.z) * pushForce;
                    }
                }

                if (!data.isCurious && state.handActive && distToHand < 3) {
                    const avoidForce = (3 - distToHand) / 3 * 0.02;
                    targetVx += (fish.position.x - state.handX) / distToHand * avoidForce;
                    targetVz += (fish.position.z - state.handZ) / distToHand * avoidForce;
                }

                data.smoothVelocity.x += (targetVx - data.smoothVelocity.x) * 0.03;
                data.smoothVelocity.y += (targetVy - data.smoothVelocity.y) * 0.03;
                data.smoothVelocity.z += (targetVz - data.smoothVelocity.z) * 0.03;

                fish.position.x += data.smoothVelocity.x;
                fish.position.y += data.smoothVelocity.y;
                fish.position.z += data.smoothVelocity.z;

                if (fish.position.x > 12) fish.position.x = -12;
                if (fish.position.x < -12) fish.position.x = 12;
                if (fish.position.z > 12) fish.position.z = -12;
                if (fish.position.z < -12) fish.position.z = 12;
                if (fish.position.y > 4) fish.position.y = -4;
                if (fish.position.y < -4) fish.position.y = 4;

                data.tailWag += data.tailWagSpeed;
                fish.children[1].rotation.y = Math.sin(data.tailWag) * 0.3;

                const angle = Math.atan2(data.smoothVelocity.z, data.smoothVelocity.x);
                fish.rotation.y = -angle;

                if (data.isCurious) {
                    const brightness = Math.max(0, 1 - distToHand / 5) * data.interestLevel;
                    data.bodyMat.emissiveIntensity = 0.2 + brightness * 0.5;
                } else {
                    data.bodyMat.emissiveIntensity = 0.2;
                }

                if (Math.random() < 0.01) {
                    data.smoothVelocity.x += (Math.random() - 0.5) * data.baseSpeed * 0.2;
                    data.smoothVelocity.y += (Math.random() - 0.5) * data.baseSpeed * 0.1;
                    data.smoothVelocity.z += (Math.random() - 0.5) * data.baseSpeed * 0.2;
                }

                data.smoothVelocity.x *= 0.999;
                data.smoothVelocity.y *= 0.999;
                data.smoothVelocity.z *= 0.999;
            });

            // 捞鱼机制
            if (state.gameActive && closestFish && closestDist < 2) {
                if (state.catchingFish !== closestFish) {
                    state.catchingFish = closestFish;
                    state.catchProgress = 0;
                }

                state.catchProgress += 0.016;

                const progressAngle = state.catchProgress / 0.5 * Math.PI * 2;
                progressRing.material.opacity = 0.8;
                progressRing.rotation.z = -progressAngle;

                const indicator = document.getElementById('catchIndicator');
                if (state.catchProgress < 0.3) {
                    indicator.className = 'catch-indicator';
                } else if (state.catchProgress < 0.5) {
                    indicator.className = 'catch-indicator charging';
                } else {
                    indicator.className = 'catch-indicator ready';
                }

                if (state.catchProgress >= 0.3) {
                    const data = closestFish.userData;
                    const points = data.points;

                    // 连击加成
                    const now = Date.now();
                    if (now - state.lastCatchTime < 3000) {
                        state.combo++;
                    } else {
                        state.combo = 1;
                    }
                    state.lastCatchTime = now;

                    const totalPoints = points * state.combo;
                    state.score += totalPoints;
                    document.getElementById('score').textContent = state.score;

                    // 显示得分
                    const info = document.getElementById('fishInfo');
                    info.textContent = `+${totalPoints}分 ${points >= 3 ? '大鱼！' : '小鱼'} ${state.combo > 1 ? 'x' + state.combo + '连击！' : ''}`;
                    info.classList.add('show');
                    setTimeout(() => info.classList.remove('show'), 1500);

                    // 中央连击显示
                    const comboDisplay = document.getElementById('comboDisplay');
                    const comboNumber = document.getElementById('comboNumber');
                    if (state.combo > 1) {
                        comboNumber.textContent = state.combo;
                        comboDisplay.classList.add('show', 'pop');
                        setTimeout(() => comboDisplay.classList.remove('pop'), 500);
                    } else {
                        comboDisplay.classList.remove('show');
                    }
                    // 保留右上角小显示
                    document.getElementById('combo').textContent = state.combo > 1 ? '🔥 ' + state.combo + '连击！' : '';

                    data.caught = true;
                    data.respawnTime = 1 + Math.random() * 1;
                    closestFish.visible = false;

                    createCatchParticles(closestFish.position.x, closestFish.position.y, closestFish.position.z, fishColors[fishes.indexOf(closestFish) % fishColors.length]);
                    createBubble(state.handX, state.handY, state.handZ, 10);
                    playCatchSound();

                    state.catchProgress = 0;
                    state.catchingFish = null;
                    progressRing.material.opacity = 0;
                    document.getElementById('catchIndicator').className = 'catch-indicator';
                }
            } else {
                state.catchProgress = 0;
                state.catchingFish = null;
                progressRing.material.opacity = 0;
                document.getElementById('catchIndicator').className = 'catch-indicator';
            }

            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= 0.005;
                p.userData.life -= 0.02;
                p.material.opacity = p.userData.life;

                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }

            // 更新气泡
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.position.y += b.userData.speed;
                b.position.x += Math.sin(state.time + b.userData.wobble) * 0.015;
                b.position.z += Math.cos(state.time + b.userData.wobble) * 0.015;

                if (b.position.y > 2) {
                    scene.remove(b);
                    bubbles.splice(i, 1);
                }
            }

            causticLight.intensity = 0.5 + (state.handActive ? (15 - state.distance) / 15 * 1.0 : 0);
            causticLight.position.set(state.handX * 0.5, state.handY, state.handZ * 0.5);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
